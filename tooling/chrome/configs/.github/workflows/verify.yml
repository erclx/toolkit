name: Verify

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  static-checks:
    name: 🛡️ Static Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Install shfmt
        run: sudo apt-get install -y shfmt

      - name: Type Check
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Check Formatting
        run: bun run check:format

      - name: Check Spelling
        run: bun run check:spell

  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Run Vitest
        run: bun run test:coverage

  build-verify:
    name: 📦 Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build Project
        run: bun run build
