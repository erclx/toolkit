[stack]
name = "chrome"
extends = "vite-react"
runtime = "bun"
scaffold = "bunx create-crxjs@latest"

[sync]
source = "configs"

[dependencies.dev]
packages = [
  "@crxjs/vite-plugin",
  "vite-plugin-zip-pack",
  "@types/chrome"
]

[scripts]
"setup" = "./scripts/setup.sh"

[gitignore]
"# Chrome Extension" = ["*.crx", "*.pem"]
"# Release" = ["release/"]
